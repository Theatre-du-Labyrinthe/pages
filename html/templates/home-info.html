{% extends 'home.html' %}

{% block modal %}

<button style="display:none"

        id="bts-modal-btn"
        data-bs-toggle="modal"
        data-bs-target="#staticBackdrop">
</button>

<div class="modal fade show"
     id="staticBackdrop"
     data-bs-backdrop="static"
     data-bs-keyboard="false"
     tabindex="-1"
     aria-labelledby="staticBackdropLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content home">
            <div class="modal-header">
                <h5 class="modal-title" id="staticBackdropLabel">
                    Spectacles du Labyrinthe, <b>Mai 2026</b>
                </h5>
            </div>
            <div class="modal-body" style="color:#2C1607; font-size:17px">
                <div style="text-align:justify">
                    Venez voir <b>Quand on aime</b> la nouvelle création et mise en scène du
                    Théâtre du Labyrinthe !
                    <!-- Venez voir les nouvelles créations et mises en scène du
                    Théâtre du Labyrinthe ! <br><br> -->
                    <!-- Vous retrouverez le (Petit) Théâtre du Labyrinthe le
                    <b>Samedi 17 Mai</b>, pour ses spectacles
                    enfants, ados et ados confirmés ! <br> -->
                    <!-- Cette année, le Théâtre du Labyrinthe vous présente sa
                    nouvelle création originale <b> Misia, ou l'intelligence
                    artificielle </b> ! -->

                    <br>
                    <div class="affiches_home">
                        <div>
                            <a class="resa_link" href="https://www.helloasso.com/associations/theatre-du-labyrinthe/" target=_blank>
                             <img src="dist/affiches/adultes/2026.avif"> </a> </div>
                    </div>
                    <br>
                    Réservez dès maintenant en cliquant sur la date souhaitée.
                    <ul>
                        <li> <a class="resa_link"
                                 href="https://www.helloasso.com/associations/theatre-du-labyrinthe/evenements/2026-quand-on-aime-30-05"
                                 target=_blank
                             >Samedi 30 Mai — 20h30</a>
                        </li>
                        <li> <a class="resa_link"
                                 href="https://www.helloasso.com/associations/theatre-du-labyrinthe/evenements/2026-quand-on-aime-31-05"
                                 target=_blank
                             >Dimanche 31 Mai — 16h30</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="modal-footer">
                <div class="btn-group" role="group" aria-label="...">
                    <button type="button"
                            class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Fermer</button>
                    <button type="button"
                            class="btn btn-outline-danger"
                            onclick="window.location.href='https://www.helloasso.com/associations/theatre-du-labyrinthe';"
                            target="_blank">Réserver !</button>
                </div>
            </div>
        </div>

</div>

{% endblock %}
